<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Launching Soon</title>

<style>
* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
  font-family: "Segoe UI", sans-serif;
}

body {
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  background: linear-gradient(135deg, #0b3d2e, #1f7a63);
  color: #fff;
  overflow: hidden;
}

/* Background glow */
body::before {
  content: "";
  position: absolute;
  width: 500px;
  height: 500px;
  background: #00ffcc;
  filter: blur(180px);
  opacity: 0.2;
  top: -100px;
  left: -100px;
}

body::after {
  content: "";
  position: absolute;
  width: 400px;
  height: 400px;
  background: #00ffcc;
  filter: blur(150px);
  opacity: 0.2;
  bottom: -100px;
  right: -100px;
}

/* Glass card */
.container {
  backdrop-filter: blur(18px);
  background: rgba(255,255,255,0.08);
  border-radius: 20px;
  padding: 40px 30px;
  text-align: center;
  width: 90%;
  max-width: 420px;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  border: 1px solid rgba(255,255,255,0.2);
  z-index: 1;
  animation: fadeIn 1s ease;
}

@keyframes fadeIn {
  from {opacity: 0; transform: translateY(20px);}
  to {opacity: 1; transform: translateY(0);}
}

h1 {
  font-size: 34px;
  margin-bottom: 10px;
}

.subtitle {
  font-size: 15px;
  opacity: 0.8;
  height: 20px;
  margin-bottom: 15px;
}

/* Countdown */
.countdown {
  display: flex;
  justify-content: center;
  gap: 12px;
  margin: 20px 0;
}

.time-box {
  background: rgba(255,255,255,0.1);
  padding: 12px;
  border-radius: 10px;
  min-width: 70px;
}

.time-box span {
  font-size: 22px;
  font-weight: bold;
  display: block;
}

/* Progress bar */
.progress {
  width: 100%;
  height: 6px;
  background: rgba(255,255,255,0.2);
  border-radius: 10px;
  margin-top: 15px;
  overflow: hidden;
}

.progress-bar {
  height: 100%;
  width: 0%;
  background: #00ffcc;
  transition: width 1s linear;
}

/* Email */
form {
  margin-top: 20px;
}

input {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  outline: none;
  margin-bottom: 10px;
}

button {
  width: 100%;
  padding: 10px;
  border-radius: 8px;
  border: none;
  background: #00ffcc;
  color: #000;
  cursor: pointer;
  font-weight: bold;
  transition: 0.3s;
}

button:hover {
  background: #fff;
}

/* Footer */
.footer {
  position: absolute;
  bottom: 10px;
  font-size: 12px;
  opacity: 0.7;
}

/* Mobile */
@media(max-width:480px){
  h1 { font-size: 28px; }
  .time-box { min-width: 60px; }
}
</style>
</head>

<body>

<div class="container">
  <h1>🚀 Coming Soon</h1>
  <div class="subtitle" id="typing"></div>

  <div class="countdown">
    <div class="time-box"><span id="m">0</span>Min</div>
    <div class="time-box"><span id="s">0</span>Sec</div>
  </div>

  <div class="progress">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <form onsubmit="alert('Thanks! You will be notified.'); return false;">
    <input type="email" placeholder="Enter your email" required>
    <button type="submit">Notify Me</button>
  </form>
</div>

<div class="footer">© 2026 Turrab Haider</div>

<script>
// Typing effect
const textArr = ["Launching in a few minutes...", "Stay connected...", "We are almost live..."];
let ti = 0, tj = 0, del = false;

function typing() {
  let word = textArr[ti];
  document.getElementById("typing").innerText = word.substring(0, tj);

  if (!del && tj < word.length) tj++;
  else if (del && tj > 0) tj--;
  else {
    del = !del;
    if (!del) ti = (ti + 1) % textArr.length;
  }

  setTimeout(typing, del ? 50 : 100);
}
typing();

// 5 minute countdown
const totalTime = 5 * 60;
let remaining = totalTime;

const timer = setInterval(() => {
  let minutes = Math.floor(remaining / 60);
  let seconds = remaining % 60;

  document.getElementById("m").innerText = minutes;
  document.getElementById("s").innerText = seconds;

  // progress bar
  let progress = ((totalTime - remaining) / totalTime) * 100;
  document.getElementById("progressBar").style.width = progress + "%";

  if (remaining <= 0) {
    clearInterval(timer);
    document.querySelector(".countdown").innerHTML = "We Are Live!";

    setTimeout(() => {
      window.location.href = "index2.html";
    }, 2000);
  }

  remaining--;
}, 1000);
</script>

</body>
</html>
