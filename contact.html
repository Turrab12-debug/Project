<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
/* Reset & Global */
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  background:#f4f6f9;
  display:flex;
  justify-content:center;
  align-items:center;
  min-height:100vh;
  padding:20px;
}

/* Contact Container */
.contact-container{
  background:white;
  padding:40px;
  width:400px;
  max-width:100%;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;
}

/* Headings */
.contact-container h1{
  margin-bottom:10px;
  font-size:28px;
}

.subtitle{
  color:#777;
  margin-bottom:25px;
  font-size:16px;
}

/* Form Inputs */
form input,
form textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:5px;
  font-size:14px;
}

textarea{
  height:100px;
  resize:none;
}

/* Button */
button{
  width:100%;
  padding:12px;
  background:#019a3c;
  border:none;
  color:white;
  font-size:16px;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#03851d;
}

/* Popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  padding:20px;
  z-index:999;
}

.popup-content{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:100%;
  max-width:350px;
  animation:popup 0.4s ease;
}

.popup-content h2{
  margin-bottom:10px;
  color:#333;
}

.popup-content button{
  margin-top:15px;
  background:#019a3c;
  color:white;
  border:none;
  padding:10px 20px;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

.popup-content button:hover{
  background:#03851d;
}

/* Popup Animation */
@keyframes popup{
  from{
    transform:scale(0.7);
    opacity:0;
  }
  to{
    transform:scale(1);
    opacity:1;
  }
}

/* Responsive Design */

/* Tablet */
@media (max-width:991px){
  .contact-container{
    padding:30px;
  }

  .contact-container h1{
    font-size:26px;
  }

  .subtitle{
    font-size:15px;
  }

  button{
    font-size:15px;
    padding:10px;
  }
}
footer{
  text-align:center;
  padding:15px;
  background:#333;
  color:white;
  margin-top:20px;
}
span{
  color:#019a3c;
}

/* Mobile */
@media (max-width:768px){
  body{
    padding:15px;
  }

  .contact-container{
    width:100%;
    padding:25px;
  }

  .contact-container h1{
    font-size:24px;
  }

  .subtitle{
    font-size:14px;
  }

  button{
    font-size:14px;
    padding:10px;
  }

  form input,
  form textarea{
    font-size:13px;
    padding:10px;
  }
}

/* Small Mobile */
@media (max-width:450px){
  .contact-container{
    padding:20px;
  }

  .contact-container h1{
    font-size:22px;
  }

  .subtitle{
    font-size:13px;
  }

  form input,
  form textarea{
    font-size:12px;
    padding:8px;
  }

  button{
    font-size:13px;
    padding:8px;
  }
}
</style>
</head>
<body>

<div class="contact-container">

  <h1>Contact Us</h1>
  <p class="subtitle">Send us your message and we will reply soon.</p>

  <form id="contactForm">

    <input type="text" name="name" placeholder="Your Name" required>
    <input type="email" name="email" placeholder="Your Email" required>
    <input type="text" name="phone" placeholder="Phone Number" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>

  </form>

</div>

<!-- Thank You Popup -->
<div class="popup" id="thankPopup">
  <div class="popup-content">
    <h2>Thank You!</h2>
    <p>Your message has been sent successfully.</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>
<footer>
  <p>&copy; 2026 ,<span>Turrab Haider</span>. All rights reserved.</p>
</footer>

<script>
// AJAX form submission to FormSubmit
const form = document.getElementById("contactForm");
form.addEventListener("submit", function(e){
    e.preventDefault(); // Prevent redirect

    // Collect form data
    const formData = new FormData(form);

    // Send using fetch to FormSubmit
    fetch("https://formsubmit.co/ajax/turrabhaider061@gmail.com", {
        method: "POST",
        body: formData
    })
    .then(response => response.json())
    .then(data => {
        // Show custom popup
        document.getElementById("thankPopup").style.display = "flex";
        // Reset form
        form.reset();
    })
    .catch(error => {
        alert("Oops! There was an error. Please try again.");
        console.error(error);
    });
});

function closePopup(){
  document.getElementById("thankPopup").style.display="none";
}
</script>

</body>
</html>
