<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact Us</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, sans-serif;
}

body{
  display:flex;
  flex-direction:column;
  min-height:100vh;
  background:#f4f6f9;
}

/* Main content */
.content-wrapper{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  padding:20px;
}

/* Contact Box */
.contact-container{
  background:white;
  padding:40px;
  width:400px;
  max-width:100%;
  border-radius:10px;
  box-shadow:0 10px 30px rgba(0,0,0,0.1);
  text-align:center;

  /* animation */
  animation:fadeUp 0.8s ease;
}

.contact-container h1{
  margin-bottom:10px;
  font-size:28px;
}

.subtitle{
  color:#777;
  margin-bottom:25px;
}

/* Inputs */
form input,
form textarea{
  width:100%;
  padding:12px;
  margin-bottom:15px;
  border:1px solid #ccc;
  border-radius:5px;
  transition:0.3s;
}

form input:focus,
form textarea:focus{
  border-color:#019a3c;
  box-shadow:0 0 5px rgba(1,154,60,0.3);
}

/* Buttons */
button{
  width:100%;
  padding:12px;
  background:#019a3c;
  border:none;
  color:white;
  border-radius:5px;
  cursor:pointer;
  transition:0.3s;
}

button:hover{
  background:#03851d;
  transform:scale(1.03);
}

/* Popup */
.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.6);
  display:none;
  justify-content:center;
  align-items:center;
  z-index:999;
}

.popup-content{
  background:white;
  padding:30px;
  border-radius:10px;
  text-align:center;
  width:100%;
  max-width:350px;
  animation:popup 0.4s ease;
}

/* Footer FIXED */
footer{
  background:#0b3d2e;
  color:#fff;
  text-align:center;
  padding:15px;
  margin-top:auto;
  font-size:14px;
}

/* Animations */
@keyframes popup{
  from{transform:scale(0.7); opacity:0;}
  to{transform:scale(1); opacity:1;}
}

@keyframes fadeUp{
  from{opacity:0; transform:translateY(40px);}
  to{opacity:1; transform:translateY(0);}
}

/* Responsive */
@media (max-width:768px){
  .contact-container{padding:25px;}
}
</style>
</head>

<body>

<div class="content-wrapper">
<div class="contact-container">
  <h1>Get In Touch</h1>
  <p class="subtitle">Send us your message and we will reply soon.</p>

  <form id="contactForm">
    <input type="text" name="name" placeholder="Enter Your Name" required>
    <input type="email" name="email" placeholder="Enter Your Email" required>
    <input type="number" name="phone" placeholder="Enter Phone Number" required>
    <textarea name="message" placeholder="Your Message" required></textarea>

    <button type="submit">Send Message</button>
    <br><br>
    <button type="button" onclick="window.location.href='index.html'">
      Back to Home
    </button>
  </form>
</div>
</div>

<!-- Popup -->
<div class="popup" id="thankPopup">
  <div class="popup-content">
    <h2>Thank You!</h2>
    <p>Your message has been sent successfully.</p>
    <button onclick="closePopup()">Close</button>
  </div>
</div>

<!-- ✅ FIXED FOOTER -->
<footer>
  © 2026 | Turrab Haider | All Rights Reserved
</footer>

<script>
const form = document.getElementById("contactForm");

form.addEventListener("submit", function(e){
  e.preventDefault();

  const formData = new FormData(form);

  fetch("https://formsubmit.co/ajax/turrabhaider061@gmail.com", {
    method: "POST",
    body: formData
  })
  .then(response => response.json())
  .then(data => {
    document.getElementById("thankPopup").style.display = "flex";
    form.reset();
  })
  .catch(error => {
    alert("Something went wrong");
  });
});

function closePopup(){
  document.getElementById("thankPopup").style.display="none";
}
</script>

</body>
</html>
