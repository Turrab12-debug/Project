<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Contact Us</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:#f4f6f9;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.contact-container{
background:white;
padding:40px;
width:400px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
text-align:center;
}

.contact-container h1{
margin-bottom:10px;
}

.subtitle{
color:#777;
margin-bottom:25px;
}

form input,
form textarea{
width:100%;
padding:12px;
margin-bottom:15px;
border:1px solid #ccc;
border-radius:5px;
font-size:14px;
}

textarea{
height:100px;
resize:none;
}

button{
width:100%;
padding:12px;
background:#019a3c;
border:none;
color:white;
font-size:16px;
border-radius:5px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#03851d;
}

/* Popup */

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.6);
display:none;
justify-content:center;
align-items:center;
}

.popup-content{
background:white;
padding:30px;
border-radius:10px;
text-align:center;
width:300px;
animation:popup 0.4s ease;
}

.popup-content h2{
margin-bottom:10px;
color:#333;
}

.popup-content button{
margin-top:15px;
background:#019a3c;
}

@keyframes popup{
from{
transform:scale(0.7);
opacity:0;
}
to{
transform:scale(1);
opacity:1;
}
}

</style>
</head>


<body>

<div class="contact-container">

<h1>Contact Us</h1>
<p class="subtitle">Send us your message and we will reply soon.</p>

<form action="https://formsubmit.co/turrabhaider061@gmail.com" method="POST" id="contactForm">

<input type="hidden" name="_captcha" value="false">
<input type="hidden" name="_next" value="false">

<input type="text" name="name" placeholder="Your Name" required>

<input type="email" name="email" placeholder="Your Email" required>

<input type="text" name="phone" placeholder="Phone Number" required>

<textarea name="message" placeholder="Your Message" required></textarea>

<button type="submit">Send Message</button>

</form>

</div>


<!-- Thank You Popup -->

<div class="popup" id="thankPopup">
<div class="popup-content">
<h2>Thank You!</h2>
<p>Your message has been sent successfully.</p>
<button onclick="closePopup()">Close</button>
</div>
</div>


<script>

const form = document.getElementById("contactForm");

form.addEventListener("submit", function(){

setTimeout(function(){
document.getElementById("thankPopup").style.display="flex";
form.reset();
},500);

});

function closePopup(){
document.getElementById("thankPopup").style.display="none";
}

</script>

</body>
</html>
