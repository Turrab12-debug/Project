<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You!</title>
<style>
    body {
        font-family: Arial, sans-serif;
        background: #f0f8ff;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
        text-align: center;
    }
    .thank-you-container {
        background: #fff;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
    }
    h1 {
        color: #007BFF;
        font-size: 2.5em;
        margin-bottom: 10px;
    }
    p {
        font-size: 1.2em;
        color: #333;
    }
    a {
        display: inline-block;
        margin-top: 20px;
        text-decoration: none;
        color: #fff;
        background: #007BFF;
        padding: 10px 20px;
        border-radius: 8px;
        transition: background 0.3s;
    }
    a:hover {
        background: #0056b3;
    }
</style>
</head>
<body>

<div class="thank-you-container">
    <h1>Thank You!</h1>
    <p>Your message has been successfully sent. We will contact you soon.</p>
    <a href="index.html">Go Back Home</a>
</div>

</body>
</html>
